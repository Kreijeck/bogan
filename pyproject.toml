[tool.poetry]
name = "bogan"
version = "0.1.0"
description = "BoardGame Analyzer"
authors = ["Kreijeck"]
license = "MIT"
readme = "README.md"

[tool.poetry.dependencies]
python = "^3.11"
Flask = "^2.3.2"
Flask-SQLAlchemy = "^3.0.3"
numpy = "^1.24.3"
pandas = "^2.0.1"
plotly = "^5.14.1"
requests = "^2.31.0"
