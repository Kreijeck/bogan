{% extends 'base.html' %}

{% block content %}

<section class="section">
  <div class="container">
    <h1 class="title">Brettspiele</h1>

    <!-- Suchfeld -->
    <div class="field">
      <label class="label">Suche</label>
      <div class="control" style="display: inline-block; margin: 0.2rem auto;">
        <input id="searchInput" class="input" type="text" placeholder="Nach einem Spiel suchen...">
      </div>
    </div>

    <!-- Liste der Brettspiele -->
    <div class="box" style="display: inline-block; margin: 0.2rem auto;">
      <ul id="gameList" class="list">
        {% for boardgame in boardgames %}
        <li class="list-item" style="padding: 1rem;">
          <a href="{{ url_for('main.show_boardgame', boardgame_id=boardgame.bgg_id) }}">
            <!-- Text oben -->
            <p class="has-text-weight-bold">{{ boardgame.name }}</p>
            
            <!-- Bild darunter -->
            <figure class="image" style="width: 10vw;">
              <img src="{{ boardgame.img_small }}" alt="Bild nicht verfügbar">
            </figure>
          </a>
        </li>
        {%endfor%}
      </ul>
    </div>
  </div>
</section>

<!-- JavaScript für die Live-Suche -->
<script>
  const searchInput = document.getElementById('searchInput');
  const gameList = document.getElementById('gameList');

  searchInput.addEventListener('input', () => {
    const filter = searchInput.value.toLowerCase();
    const items = gameList.querySelectorAll('.list-item');

    items.forEach(item => {
      const text = item.textContent.toLowerCase();
      // Einfache Filterung nach Teilstring
      if (text.includes(filter)) {
        item.style.display = '';
      } else {
        item.style.display = 'none';
      }
    });
  });
</script>
{% endblock %}
